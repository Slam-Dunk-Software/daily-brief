[package]
name        = "daily_brief"
version     = "0.1.1"
description = "Texts you a daily summary of your todo list at a scheduled time."
authors     = ["nickagliano"]
license     = "MIT"
repository  = "https://github.com/Slam-Dunk-Software/daily-brief"
platform    = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]

[service]
enabled      = true
startup      = true
start        = "daily-brief"
port         = 5544
health_check = "GET /health"
